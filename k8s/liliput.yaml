apiVersion: v1
kind: Namespace
metadata:
  name: liliput
  labels:
    azure.workload.identity/use: "true"
---
# ─── ServiceAccount for the agent (federated to UAMI for ACR push) ───
apiVersion: v1
kind: ServiceAccount
metadata:
  name: liliput-agent
  namespace: liliput
  annotations:
    azure.workload.identity/client-id: "f14665ae-86f5-41c2-95ba-96e817132222"
  labels:
    azure.workload.identity/use: "true"
---
# ─── ClusterRole granting the agent perms to manage dev environments ───
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: liliput-agent
rules:
  # Manage namespaces (create per-task dev envs, tear them down)
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # Manage workloads in any namespace
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services", "configmaps", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods/log", "pods/exec"]
    verbs: ["get", "create"]
  # Read events for diagnostics
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: liliput-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: liliput-agent
subjects:
  - kind: ServiceAccount
    name: liliput-agent
    namespace: liliput
---
# ─── NGINX Reverse Proxy Config ───
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: liliput
data:
  nginx.conf: |
    events { worker_connections 1024; }
    http {
      upstream api { server liliput-api:80; }
      upstream web { server liliput-web:80; }

      map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
      }

      server {
        listen 80;

        # API routes
        location /api/ {
          proxy_pass http://api;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
        }

        # Socket.io (WebSocket + polling)
        location /socket.io/ {
          proxy_pass http://api;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_read_timeout 86400;
        }

        # === LILIPUT-DEV-ENVS-BEGIN ===
        # === LILIPUT-DEV-ENVS-END ===

        # Everything else → web
        location / {
          proxy_pass http://web;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
        }
      }
    }
---
# ─── API Deployment ───
apiVersion: apps/v1
kind: Deployment
metadata:
  name: liliput-api
  namespace: liliput
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: liliput-api
  template:
    metadata:
      labels:
        app: liliput-api
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: liliput-agent
      containers:
        - name: api
          image: crgarliliputacr.azurecr.io/liliput-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: NODE_ENV
              value: "production"
            # Azure context for `az acr build`
            - name: AZURE_TENANT_ID
              value: "f75dc6d8-f0ea-4a54-9d3c-622e4aef8eb3"
            - name: AZURE_SUBSCRIPTION_ID
              value: "ac866176-3fcf-43c6-817a-6309be256398"
            - name: AZURE_CLIENT_ID
              value: "f14665ae-86f5-41c2-95ba-96e817132222"
            - name: ACR_NAME
              value: "crgarliliputacr"
            - name: AGENT_WORKSPACE_ROOT
              value: "/workspaces"
            # GitHub Copilot SDK auth — token rotated via GitHub Actions.
            # Same token is used for git clone/push and PR creation.
            - name: COPILOT_GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: liliput-secrets
                  key: COPILOT_GITHUB_TOKEN
                  optional: true
          volumeMounts:
            - name: workspaces
              mountPath: /workspaces
            - name: az-cache
              mountPath: /home/node/.azure
          resources:
            requests: { cpu: "10m", memory: "128Mi" }
            limits:   { cpu: "1000m", memory: "1Gi" }
          readinessProbe:
            httpGet: { path: /api/health, port: 8080 }
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: { path: /api/health, port: 8080 }
            initialDelaySeconds: 10
      volumes:
        - name: workspaces
          emptyDir: {}
        - name: az-cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: liliput-api
  namespace: liliput
spec:
  selector: { app: liliput-api }
  ports:
    - port: 80
      targetPort: 8080
---
# ─── Web Deployment ───
apiVersion: apps/v1
kind: Deployment
metadata:
  name: liliput-web
  namespace: liliput
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: liliput-web
  template:
    metadata:
      labels:
        app: liliput-web
    spec:
      containers:
        - name: web
          image: crgarliliputacr.azurecr.io/liliput-web:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
          resources:
            requests: { cpu: "10m", memory: "64Mi" }
            limits:   { cpu: "500m", memory: "384Mi" }
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 10
          livenessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: liliput-web
  namespace: liliput
spec:
  selector: { app: liliput-web }
  ports:
    - port: 80
      targetPort: 3000
---
# ─── NGINX Gateway (single entry point) ───
apiVersion: apps/v1
kind: Deployment
metadata:
  name: liliput-gateway
  namespace: liliput
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: liliput-gateway
  template:
    metadata:
      labels:
        app: liliput-gateway
    spec:
      containers:
        - name: nginx
          image: nginx:1-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          resources:
            requests: { cpu: "10m", memory: "32Mi" }
            limits:   { cpu: "200m", memory: "64Mi" }
      volumes:
        - name: config
          configMap:
            name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: liliput-gateway
  namespace: liliput
spec:
  type: LoadBalancer
  selector: { app: liliput-gateway }
  ports:
    - port: 80
      targetPort: 80
