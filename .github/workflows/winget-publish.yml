name: Publish CLI to WinGet

# Auto-creates a PR to microsoft/winget-pkgs whenever a new cli-v* release
# is published. The very first version (cli-v0.1.0) had to be submitted
# manually with `wingetcreate new` — see cli/README.md for the one-time
# bootstrap steps.

on:
  release:
    types: [released]

jobs:
  publish:
    # Only run for CLI releases, not for any future non-CLI releases on this repo.
    if: startsWith(github.event.release.tag_name, 'cli-v')
    runs-on: windows-latest
    steps:
      - name: Submit / update WinGet manifest
        uses: vedantmgoyal9/winget-releaser@main
        with:
          identifier: crgarcia12.Liliput
          # Only the .exe asset becomes a WinGet installer; macOS/Linux binaries are ignored.
          installers-regex: '-windows-amd64\.exe$'
          # Strip the leading "cli-v" so the WinGet manifest version is e.g. "0.1.1".
          version: ${{ github.event.release.tag_name }}
          token: ${{ secrets.WINGET_TOKEN }}
