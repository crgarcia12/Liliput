name: Release CLI

on:
  push:
    tags:
      - 'cli-v*'
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            binary: liliput-windows-amd64.exe
          - goos: linux
            goarch: amd64
            binary: liliput-linux-amd64
          - goos: darwin
            goarch: amd64
            binary: liliput-darwin-amd64
          - goos: darwin
            goarch: arm64
            binary: liliput-darwin-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download modules
        working-directory: cli
        run: go mod download

      - name: Build ${{ matrix.binary }}
        working-directory: cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o ../${{ matrix.binary }} ./cmd/liliput

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/cli-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/liliput-windows-amd64.exe
            dist/liliput-linux-amd64
            dist/liliput-darwin-amd64
            dist/liliput-darwin-arm64
