apiVersion: v1
kind: Namespace
metadata:
  name: devbox
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: devbox-home
  namespace: devbox
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: managed-csi
  resources:
    requests:
      storage: 32Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: devbox
  namespace: devbox
spec:
  serviceName: devbox
  replicas: 1
  selector:
    matchLabels: { app: devbox }
  template:
    metadata:
      labels: { app: devbox }
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: devbox
          image: __ACR_LOGIN_SERVER__/devbox:latest
          imagePullPolicy: Always
          command: ["sleep", "infinity"]
          tty: true
          stdin: true
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits:   { cpu: "2",    memory: "4Gi" }
          volumeMounts:
            - name: home
              mountPath: /home/node
          env:
            - name: TZ
              value: "UTC"
      volumes:
        - name: home
          persistentVolumeClaim:
            claimName: devbox-home
